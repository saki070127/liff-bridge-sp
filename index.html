<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>発注フォーム</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <p style="font-family:sans-serif;color:#666;text-align:center;margin-top:40px;">
    読み込み中...
  </p>
  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycby6m4MKjMIydzzv7qQ29o3-3-SHw8dNawMXtJcaci830z-gRk8eJ02xY9Ik2H5WKHu5oA/exec';

    function goToForm(params) {
      const query = params ? '?' + params : '';
      document.querySelector('p').textContent = '飛び先: ' + GAS_URL + query;
      setTimeout(function() {
        window.location.replace(GAS_URL + query);
      }, 3000);
    }

    liff.init({ liffId: '2010368974-D2YA42Hn' })
      .then(function() {
        if (liff.isLoggedIn()) {
          return liff.getProfile().then(function(profile) {
            goToForm(
              'lineUserId=' + encodeURIComponent(profile.userId) +
              '&lineDisplayName=' + encodeURIComponent(profile.displayName)
            );
          });
        } else {
          goToForm('');
        }
      })
      .catch(function(e) {
        goToForm('');
      });
  </script>
</body>
</html>
